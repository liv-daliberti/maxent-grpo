# Model arguments
model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
model_revision: main
resume_from_checkpoint: false
torch_dtype: float16
attn_implementation: sdpa

# Data training arguments
dataset_name: open-r1/OpenR1-Math-220k
dataset_prompt_column: problem
eval_dataset_name: HuggingFaceH4/MATH-500
eval_dataset_split: test
eval_dataset_prompt_column: problem
eval_dataset_solution_column: answer
system_prompt: |
  TAG TEMPLATE (copy this shape for every problem)
  <think>
  YOUR reasoning process goes here:
  1. state the goal and constraints
  2. name the method(s)
  3. show each step to the result
  </think>
  <answer>
  THEANSWER
  </answer>

  Respond in exactly this tag-based format. No text outside the tags.
  Put the final answer inside <answer> only. Use exact math (fractions, radicals, pi, e).
  Verify the result satisfies the original conditions.
# InfoSeed knobs (enabled)
info_seed_enabled: true
info_seed_num_seeds: 4
info_seed_lambda: 0.01
info_seed_alpha_entropy: 0.5
info_seed_prompt_template: "\n[seed={seed}]"
info_seed_loss_type: infonce
info_seed_pooling: mean
info_seed_temperature: 0.3

# Phase 2 meta-controller defaults (analytic updates for τ/β)
controller_meta_enabled: true
controller_meta_method: analytic
controller_meta_lr: 0.02
controller_meta_update_interval: 1
controller_meta_optimizer: sgd
controller_meta_truncation_steps: 1

# GRPO trainer config (InfoSeed uses GRPO objective)
bf16: false
fp16: true
use_vllm: true
vllm_mode: server
vllm_gpu_memory_utilization: 0.9
vllm_sync_interval_steps: 10  # sync weights every N optimizer steps when enabled (0 disables)
do_eval: true
gradient_accumulation_steps: 64
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
hub_model_id: od2961/Qwen2.5-1.5B-Open-R1-InfoSeed-math-v1
hub_strategy: every_save
learning_rate: 5e-6
adam_beta2: 0.99
adam_epsilon: 1e-06
log_completions: true
log_level: info
logging_first_step: true
logging_steps: 1
logging_strategy: steps
lr_scheduler_type: cosine
max_prompt_length: 1400
max_completion_length: 600
max_steps: -1
num_generations: 4
num_train_epochs: 3
output_dir: var/data/Qwen2.5-1.5B-Open-R1-InfoSeed-math-v1
overwrite_output_dir: true
per_device_eval_batch_size: 8
per_device_train_batch_size: 8
# DataLoader throughput knobs (custom loop + baseline)
dataloader_num_workers: 4
dataloader_pin_memory: true
dataloader_prefetch_factor: 2
dataloader_persistent_workers: true
push_to_hub: true
report_to:
- wandb
reward_funcs:
- pure_accuracy_math
reward_weights:
- 1
kl_target:        0.07
beta:    0.50
kl_horizon:       50000
kl_ctl_step_size: 0.15
max_grad_norm: 0.15
vf_coef: 0.25
advantage_normalization: running
horizon: 1024
save_strategy: steps
save_steps: 50
eval_strategy: steps
eval_steps: 25
save_total_limit: 1000
seed: 42
warmup_ratio: 0.2
reward_normalization: true
gamma: 0.99
gae_lambda: 0.95
log_grad_norm_after_clip: true
log_kl_per_token: true
reward_clip: [-6.0, 6.0]
advantage_clip: [-2.5, 2.5]
ppo_clip_range:     0.05
clip_range_vf:  0.5
