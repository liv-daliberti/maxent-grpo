# Stable paired MaxEnt recipe on the same 1.5B math backbone.
# Match the fair quartet batch/length/eval settings used by the shared stable
# GRPO backbone.

# Model arguments
model_name_or_path: Qwen/Qwen2.5-Math-1.5B
reference_model_name_or_path: Qwen/Qwen2.5-Math-1.5B
model_revision: main
resume_from_checkpoint: false
torch_dtype: float16
attn_implementation: sdpa

# Data training arguments
dataset_name: axon-rl/MATH-lvl3to5-8k
dataset_config: default
dataset_prompt_column: problem
dataset_solution_column: answer
eval_dataset_name: aime24,amc,math_500,minerva,olympiad_bench
eval_dataset_split: test
eval_dataset_prompt_column: problem
eval_dataset_solution_column: answer
disable_distributed_sampler: true
prompt_template: null
maxent_prompt_cache_size: 20000
dataloader_num_workers: 4
dataloader_persistent_workers: true
dataloader_prefetch_factor: 2
dataloader_pin_memory: true
system_prompt: |
  Solve the problem and respond in exactly this format:
  <think>
  step-by-step reasoning
  </think>
  <answer>
  \boxed{FINAL_ANSWER}
  </answer>

  Requirements:
  - Output must start with <think> and end with </answer>.
  - Put the final answer inside <answer> as a single boxed expression.
  - Do not add any text after the final answer.
  - Use exact math notation (fractions, radicals, pi, e) when appropriate.
chat_template: |
  {%- for message in messages -%}
  {{- message['content'] -}}
  {%- endfor -%}

# Stable entropy-MaxEnt config on the same Dr.GRPO backbone.
objective: maxent_entropy
maxent_alpha: 0.005
policy_entropy_bonus_coef: 0.0
maxent_policy_entropy: true
maxent_policy_entropy_mode: exact
maxent_alpha_raise_on_low_kl: false
maxent_alpha_lower_on_high_kl: true
maxent_alpha_kl_threshold: 0.07
maxent_alpha_kl_gain: 0.5
maxent_alpha_disable_outside_trust_zone: true
maxent_reference_logprobs_source: model
maxent_trl_reference_scoring: true
maxent_reference_ema_enabled: false
behavior_logprobs_source: model
maxent_length_normalize_ref: true
maxent_length_normalize_policy: true
maxent_allow_empty_weight_fallback: true
maxent_clip_adv_baseline: null
maxent_score_tail_tokens: null
scale_rewards: false

# Training/eval & logging
bf16: true
fp16: false
use_vllm: true
vllm_mode: colocate
torch_compile: false
vllm_return_logprobs: true
vllm_request_logprobs: true
vllm_sync_weights: true
vllm_sync_interval_steps: 1
vllm_gpu_memory_utilization: 0.35
maxent_logprob_chunk_size: 2
do_eval: false
gradient_accumulation_steps: 40
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
grpo_loss_type: dr_grpo
dr_grpo_denominator_mode: active_tokens
num_iterations: 1
gen_temperature: 1.0
gen_top_p: 1.0
gen_top_k: -1
vllm_top_k: -1
gen_best_of: 1
vllm_stop_sequences:
  - "</answer>"
  - "</answer>\n"
vllm_request_timeout: 600
hub_model_id: null
hub_strategy: "end"
learning_rate: 1e-6
lr_scheduler_type: constant
optim: adamw_torch
adam_beta1: 0.9
adam_beta2: 0.95
adam_epsilon: 1e-08
weight_decay: 0.0
log_completions: true
log_level: 20
logging_first_step: true
logging_steps: 1
logging_strategy: steps
log_like_grpo: true
max_prompt_length: 1024
max_completion_length: 3000
max_steps: -1
num_generations: 8
num_train_epochs: 20
output_dir: var/data/Qwen2.5-1.5B-Open-R1-MaxEnt-GRPO-BASELINE-math-stable-v1
overwrite_output_dir: true
per_device_train_batch_size: 8
per_device_eval_batch_size: 8
push_to_hub: false
report_to:
- wandb
wandb_project: open-r1-maxent-grpo
wandb_entity: ogd3-princeton-university
reward_funcs:
- seed_paper_boxed_accuracy_math
- missing_boxed_answer_penalty_math
reward_weights:
- 1
- 1
eval_reward_funcs:
- seed_paper_boxed_accuracy_math
eval_reward_weights:
- 1
missing_boxed_answer_penalty: -0.05
beta: 0.0
kl_target: 0.0
kl_horizon: 500
kl_ctl_step_size: 1.0
grpo_beta_controller_enabled: false
maxent_beta_controller_enabled: false
max_grad_norm: 1.0
ppo_clip_range: 0.2
clip_range: 0.2
clip_range_high: 0.2
save_strategy: "no"
save_steps: 1
# Built-in trainer eval is disabled for these math runs; official paper eval is
# scheduled directly by SeedPaperEvalCallback on start and every eval_steps.
eval_strategy: "no"
eval_on_start: true
eval_steps: 10
seed_paper_eval_template: "no"
greedy_eval_enabled: true
eval_greedy_only_enabled: true
truncate_completions_at_first_boxed_answer: true
save_total_limit: 1000
seed: 42
warmup_ratio: 0.0
