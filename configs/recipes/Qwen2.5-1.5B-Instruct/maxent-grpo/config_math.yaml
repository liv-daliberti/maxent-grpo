# Model arguments
model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
reference_model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
model_revision: main
resume_from_checkpoint: false
torch_dtype: float16
attn_implementation: sdpa

# Data training arguments
dataset_name: open-r1/OpenR1-Math-220k
dataset_prompt_column: problem
eval_dataset_name: aime24,amc,math
eval_dataset_split: test
eval_dataset_prompt_column: problem
eval_dataset_solution_column: answer
disable_distributed_sampler: true
maxent_prompt_cache_size: 20000
dataloader_num_workers: 4
dataloader_persistent_workers: true
dataloader_prefetch_factor: 2
dataloader_pin_memory: true
system_prompt: |
  TAG TEMPLATE (copy this shape for every problem)
  <think>
  YOUR reasoning process goes here:
  1. state the goal and constraints
  2. name the method(s)
  3. show each step to the result
  </think>
  <answer>
  THEANSWER
  </answer>

  Respond in exactly this tag-based format. No text outside the tags.
  Put the final answer inside <answer> only. Use exact math (fractions, radicals, pi, e).
  Verify the result satisfies the original conditions.
# Paired MaxEnt config (mirrors GRPO sampling/reference/KL settings)
# MaxEnt bonus base scale.
objective: maxent_entropy
maxent_alpha: 1.0
policy_entropy_bonus_coef: 0.0
maxent_policy_entropy: true
# Adapt MaxEnt alpha around the KL budget (raise below target, lower above target).
maxent_alpha_raise_on_low_kl: true
maxent_alpha_lower_on_high_kl: true
maxent_alpha_kl_threshold: 0.07
maxent_alpha_kl_gain: 1.0
maxent_alpha_kl_min_multiplier: 0.5
maxent_alpha_kl_max_multiplier: 2.0
# Entropy-regularized MaxEnt uses the exact entropy gradient in the loss.
maxent_policy_entropy_mode: exact
# Scoring/kl settings for the objective.
# Prefer vLLM logprob metadata when available; fall back as needed.
maxent_reference_logprobs_source: model
maxent_trl_reference_scoring: true
# Keep the same frozen reference anchor as the paired GRPO run.
maxent_reference_ema_enabled: false
behavior_logprobs_source: model
maxent_length_normalize_ref: true
maxent_allow_empty_weight_fallback: true
maxent_clip_adv_baseline: null
maxent_score_tail_tokens: null
scale_rewards: true

# Training/eval & logging
bf16: true
fp16: false
use_vllm: true            # enable vLLM server path for generation
vllm_mode: server         # use external/inline server launched by the slurm helper
torch_compile: false      # disabled: torch.compile is unstable with DeepSpeed/ZeRO here
# Request vLLM logprob metadata for reference/KL when available.
vllm_return_logprobs: true
vllm_request_logprobs: true
vllm_sync_weights: false
vllm_sync_interval_steps: 10  # sync weights every N optimizer steps when enabled (0 disables)
vllm_gpu_memory_utilization: 0.9
do_eval: true
gradient_accumulation_steps: 32    # match the paired GRPO recipe
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
gen_temperature: 1.0
gen_top_p: 1.0
gen_top_k: 0
gen_best_of: 1
vllm_stop_sequences:
  - "</answer>"
  - "</answer>\n"
  - "</assistant>"
vllm_request_timeout: 600
hub_model_id: null
hub_strategy: "end"
learning_rate: 1e-6
optim: adamw_torch_fused
adam_beta2: 0.99
adam_epsilon: 1e-06
log_completions: true
log_level: 20
logging_first_step: true
logging_steps: 1
logging_strategy: steps
log_like_grpo: true
lr_scheduler_type: cosine
max_prompt_length: 2096      # trim prompt window to ease ref scoring memory
max_completion_length: 1948   # shorter completions to reduce activation + ref costs
max_steps: 2000
# GRPO requires >=2 generations to compute advantages; keep this at 2+ even when reducing memory.
num_generations: 16
num_train_epochs: 5
output_dir: var/data/Qwen2.5-1.5B-Open-R1-MaxEnt-GRPO-BASELINE-math-v1
overwrite_output_dir: true
per_device_eval_batch_size: 8
per_device_train_batch_size: 2
push_to_hub: false
report_to:
- wandb
wandb_project: open-r1-maxent-grpo
wandb_entity: ogd3-princeton-university
reward_funcs:
- pure_accuracy_math
reward_weights:
- 1

# Reverse-KL weight beta used inside MaxEnt update
# Gentle KL controller: keep updates small even when KL is far from target.
beta: 0.5
kl_target:        0.07
kl_horizon:       500
kl_ctl_step_size: 1.0

# Misc GRPO‑style knobs (not all consumed by the minimal script, kept for consistency)
max_grad_norm: 0.15
ppo_clip_range: 0.05
clip_range: 0.05
save_strategy: steps
save_steps: 50
eval_strategy: steps
eval_steps: 25
save_total_limit: 1000
seed: 42
vllm_url: http://localhost:29525/generate/
warmup_ratio: 0.2
