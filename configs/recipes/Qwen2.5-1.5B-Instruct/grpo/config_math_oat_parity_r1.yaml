# Closest-possible TRL/vLLM parity recipe for the public OAT-Zero-1.5B Dr.GRPO run.
# This keeps the local trainer stack, but aligns the controllable knobs to the
# official 1.5B command: r1 template, math_12k, bf16, colocated vLLM, sync every
# update, 16 rollout slices/update, 8 samples/prompt, and no in-training extras.

# Model arguments
model_name_or_path: Qwen/Qwen2.5-Math-1.5B
reference_model_name_or_path: Qwen/Qwen2.5-Math-1.5B
model_revision: main
resume_from_checkpoint: false
torch_dtype: bfloat16
# The parity launcher upgrades this to flash_attention_2 when flash-attn is installed.
attn_implementation: sdpa

# Data arguments
dataset_name: datasets/train/math_12k
dataset_config: null
dataset_prompt_column: problem
dataset_solution_column: answer
eval_dataset_name: aime24,amc,math_500,minerva,olympiad_bench
eval_dataset_split: test
eval_dataset_prompt_column: problem
eval_dataset_solution_column: answer
disable_distributed_sampler: false
prompt_template: "r1"
system_prompt: null
chat_template: null

# Dr.GRPO / rollout settings
bf16: true
fp16: false
use_vllm: true
vllm_mode: colocate
torch_compile: false
vllm_return_logprobs: true
vllm_request_logprobs: true
maxent_reference_logprobs_source: model
maxent_trl_reference_scoring: true
behavior_logprobs_source: model
maxent_logprob_chunk_size: 1
policy_entropy_bonus_coef: 0.0
maxent_length_normalize_ref: false
maxent_length_normalize_policy: false
maxent_policy_entropy: false
vllm_sync_weights: true
vllm_sync_interval_steps: 1
vllm_gpu_memory_utilization: 0.35
do_eval: false
# OAT learns from 128 sampled trajectories/rank per rollout round and applies one
# optimizer update every 16 trajectories. In TRL, the equivalent shape is:
#   per_device_train_batch_size=8, gradient_accumulation_steps=2,
#   steps_per_generation=16, num_generations=8
# which yields 128 flat samples/rank per generation batch, 16 unique prompts/rank,
# and 8 optimizer updates per generation batch.
gradient_accumulation_steps: 2
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
objective: grpo
grpo_loss_type: dr_grpo
dr_grpo_denominator_mode: fixed_max
num_iterations: 1
gen_temperature: 1.0
gen_top_p: 1.0
gen_top_k: -1
vllm_top_k: -1
gen_best_of: 1
vllm_stop_sequences:
  - "</answer>"
vllm_include_stop_str_in_output: true
vllm_request_timeout: 600

# Optimization
hub_model_id: null
hub_strategy: "end"
learning_rate: 1e-6
lr_scheduler_type: constant
optim: adamw_torch
adam_beta1: 0.9
adam_beta2: 0.95
adam_epsilon: 1e-08
weight_decay: 0.0
max_grad_norm: 1.0
ppo_clip_range: 0.2
clip_range: 0.2
clip_range_high: 0.2
beta: 0.0
kl_target: 0.0
kl_horizon: 0
kl_ctl_step_size: 0.0
grpo_beta_controller_enabled: false
maxent_beta_controller_enabled: false
scale_rewards: false
zero_truncated_completion_rewards: true

# Logging / schedule
log_completions: false
rich_log_completions: false
log_level: 20
logging_first_step: true
logging_steps: 1
logging_strategy: steps
log_like_grpo: true
max_prompt_length: 1024
max_completion_length: 3000
# Match OAT's actual optimizer-update budget for the public 1.5B recipe.
# Upstream OAT computes 93 rollout rounds per prompt epoch:
#   len(math_12k)=12000, rollout/train batch size=128, drop_last=True => floor(12000 / 128)=93.
# But each OAT rollout round produces 8 learner optimizer updates:
#   local trajectories/rank = 16 prompts * 8 samples = 128
#   DeepSpeed grad_acc_step = 128 / (train_batch_size_per_device=1 * world_size=8) = 16
#   optimizer updates/round = 128 / 16 = 8
# Therefore the OAT-equivalent optimizer budget is:
#   93 rollout rounds/epoch * 8 optimizer updates/round * 20 prompt epochs = 14880.
max_steps: 14880
num_generations: 8
# Flat local generation batch per device = per_device_train_batch_size * steps_per_generation = 128,
# corresponding to 16 unique prompts/device at 8 samples/prompt.
steps_per_generation: 16
num_train_epochs: 20
output_dir: var/data/Qwen2.5-Math-1.5B-TRL-DrGRPO-oat-parity-r1-v1
overwrite_output_dir: true
per_device_train_batch_size: 8
per_device_eval_batch_size: 200
dataloader_drop_last: true
dataloader_num_workers: 0
dataloader_pin_memory: true
dataloader_persistent_workers: false
push_to_hub: false
report_to:
- wandb
wandb_project: huggingface
wandb_entity: ogd3-princeton-university

# Rewards
reward_funcs:
- seed_paper_answer_tag_accuracy_math
reward_weights:
- 1
seed_paper_reward_fast: true
eval_reward_funcs:
- seed_paper_answer_tag_accuracy_math
eval_reward_weights:
- 1

# Save checkpoints every 50 optimizer steps and keep the explicit final model save.
save_strategy: "steps"
save_steps: 50
save_total_limit: null
final_model_save_enabled: true
eval_strategy: "no"
eval_steps: 16
eval_on_start: false
seed_paper_eval_enabled: false
seed_paper_eval_pass_at_8_enabled: false
seed_paper_eval_fail_on_error: false
seed_paper_eval_template: "r1"
seed: 42
warmup_ratio: 0.0
