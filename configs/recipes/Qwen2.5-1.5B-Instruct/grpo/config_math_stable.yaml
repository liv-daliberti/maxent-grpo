# Stable 1.5B math backbone for fair quartet comparisons.
# It keeps the same model/datasets/eval sets as config_math.yaml, but adds
# shared stabilizers that make 3k-token rollouts tractable again:
# - explicit answer-tag termination at 3k tokens
# - active-token Dr.GRPO normalization
# - missing-answer penalty to discourage long zero-reward rambles
# - official SEED paper math reward parity
# - full in-training eval only at startup and every 100 steps
# - stop scoring/training after the first boxed answer

# Model arguments
model_name_or_path: Qwen/Qwen2.5-Math-1.5B
reference_model_name_or_path: Qwen/Qwen2.5-Math-1.5B
model_revision: main
resume_from_checkpoint: false
torch_dtype: float16
attn_implementation: sdpa

# Data training arguments
dataset_name: axon-rl/MATH-lvl3to5-8k
dataset_config: default
dataset_prompt_column: problem
dataset_solution_column: answer
eval_dataset_name: aime24,amc,math_500,minerva,olympiad_bench
eval_dataset_split: test
eval_dataset_prompt_column: problem
eval_dataset_solution_column: answer
disable_distributed_sampler: true
system_prompt: |
  Solve the problem and respond in exactly this format:
  <think>
  step-by-step reasoning
  </think>
  <answer>
  \boxed{FINAL_ANSWER}
  </answer>

  Requirements:
  - Output must start with <think> and end with </answer>.
  - Put the final answer inside <answer> as a single boxed expression.
  - Do not add any text after the final answer.
  - Use exact math notation (fractions, radicals, pi, e) when appropriate.
chat_template: |
  {%- for message in messages -%}
  {{- message['content'] -}}
  {%- endfor -%}

# Shared runtime settings
bf16: true
fp16: false
use_vllm: true
vllm_mode: colocate
torch_compile: false
vllm_return_logprobs: true
vllm_request_logprobs: true
maxent_reference_logprobs_source: model
maxent_trl_reference_scoring: true
behavior_logprobs_source: model
maxent_logprob_chunk_size: 2
policy_entropy_bonus_coef: 0.0
maxent_length_normalize_ref: true
maxent_length_normalize_policy: true
maxent_policy_entropy: false
vllm_sync_weights: false
vllm_gpu_memory_utilization: 0.35
do_eval: false
# Quartet single-stack runs use 3 trainer GPUs plus 1 vLLM GPU.
# With per_device_train_batch_size: 8 keeping one prompt-group/device, 40 grad
# accumulation steps gives an effective prompt batch of about 120/grouped prompts.
gradient_accumulation_steps: 40
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
objective: grpo
grpo_loss_type: dr_grpo
dr_grpo_denominator_mode: active_tokens
num_iterations: 1
gen_temperature: 1.0
gen_top_p: 1.0
gen_top_k: -1
vllm_top_k: -1
gen_best_of: 1
vllm_stop_sequences:
  - "</answer>"
  - "</answer>\n"
vllm_request_timeout: 600
hub_model_id: null
hub_strategy: "end"
learning_rate: 1e-6
lr_scheduler_type: constant
optim: adamw_torch
adam_beta1: 0.9
adam_beta2: 0.95
adam_epsilon: 1e-08
weight_decay: 0.0
log_completions: true
log_level: 20
logging_first_step: true
logging_steps: 1
logging_strategy: steps
log_like_grpo: true
max_prompt_length: 1024
max_completion_length: 3000
max_steps: -1
num_generations: 8
num_train_epochs: 20
output_dir: var/data/Qwen2.5-1.5B-Open-R1-GRPO-BASELINE-math-stable-v1
overwrite_output_dir: true
per_device_train_batch_size: 8
per_device_eval_batch_size: 8
dataloader_num_workers: 4
dataloader_pin_memory: true
dataloader_prefetch_factor: 2
dataloader_persistent_workers: true
push_to_hub: false
report_to:
- wandb
wandb_project: huggingface
wandb_entity: ogd3-princeton-university
reward_funcs:
  - seed_paper_boxed_accuracy_math
  - missing_boxed_answer_penalty_math
reward_weights:
- 1
- 1
eval_reward_funcs:
  - seed_paper_boxed_accuracy_math
eval_reward_weights:
- 1
missing_boxed_answer_penalty: -0.05
scale_rewards: false
beta: 0.0
kl_target: 0.0
kl_horizon: 500
kl_ctl_step_size: 1.0
grpo_beta_controller_enabled: false
maxent_beta_controller_enabled: false
max_grad_norm: 1.0
ppo_clip_range: 0.2
clip_range: 0.2
clip_range_high: 0.2
save_strategy: "no"
save_steps: 1
# Built-in trainer eval is disabled for these math runs; official paper eval is
# scheduled directly by SeedPaperEvalCallback on start and every eval_steps.
eval_strategy: "no"
eval_on_start: true
eval_steps: 10
seed_paper_eval_template: "no"
greedy_eval_enabled: true
eval_greedy_only_enabled: true
truncate_completions_at_first_boxed_answer: true
save_total_limit: 1000
seed: 42
warmup_ratio: 0.0
