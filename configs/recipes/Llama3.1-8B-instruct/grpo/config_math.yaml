model_name_or_path: meta-llama/Llama-3.1-8B-Instruct
model_revision: main
overwrite_output_dir: true
resume_from_checkpoint: false
torch_dtype: float16
attn_implementation: sdpa
dataset_name: open-r1/OpenR1-Math-220k
zero3_save_16bit_model: true
dataset_prompt_column: problem
system_prompt: |
  TAG TEMPLATE (copy this shape for every problem)
  <think>
  YOUR reasoning process goes here:
  1. state the goal and constraints
  2. name the method(s)
  3. show each step to the result
  </think>
  <answer>
  THEANSWER
  </answer>

  Respond in exactly this tag-based format. No text outside the tags.
  Put the final answer inside <answer> only. Use exact math (fractions, radicals, pi, e).
  Verify the result satisfies the original conditions.
bf16: true
use_vllm: true
vllm_mode: colocate
do_eval: false
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 8
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
objective: grpo
hub_model_id: od2961/Llama-8B-Open-R1-GRPO-math-v2
hub_strategy: every_save
push_to_hub: true
learning_rate: 5.0e-06
adam_beta2: 0.99
adam_epsilon: 1.0e-06
log_completions: true
log_level: info
logging_first_step: true
logging_steps: 1
logging_strategy: steps
lr_scheduler_type: cosine
max_prompt_length: 450
max_completion_length: 650
max_steps: -1
num_generations: 4
num_train_epochs: 3
output_dir: var/data/Llama-8B-Open-R1-GRPO-math-v2
report_to:
- wandb
reward_funcs:
- pure_accuracy_math
reward_weights:
- 1
kl_target: 0.07
beta: 0.50
kl_horizon: 50000
kl_ctl_step_size: 0.15
max_grad_norm: 0.15
vf_coef: 0.25
advantage_normalization: running
horizon: 1024
save_strategy: steps
save_steps: 50
eval_strategy: 'no'
eval_steps: 100
save_total_limit: 1000
seed: 42
warmup_ratio: 0.2
reward_normalization: true
gamma: 0.99
gae_lambda: 0.95
log_grad_norm_after_clip: true
log_kl_per_token: true
reward_clip:
- -6.0
- 6.0
advantage_clip:
- -2.5
- 2.5
ppo_clip_range: 0.10
clip_range_vf: 0.5
maxent_policy_entropy: false
