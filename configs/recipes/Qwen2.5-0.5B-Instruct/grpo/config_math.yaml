# Model arguments
model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
model_revision: main
resume_from_checkpoint: false
torch_dtype: float16
attn_implementation: sdpa

# Data training arguments
dataset_name: open-r1/OpenR1-Math-220k
dataset_prompt_column: problem
eval_dataset_name: HuggingFaceH4/MATH-500
eval_dataset_split: test
eval_dataset_prompt_column: problem
eval_dataset_solution_column: answer
disable_distributed_sampler: true
maxent_prompt_cache_size: 20000
dataloader_num_workers: 4
dataloader_persistent_workers: true
dataloader_prefetch_factor: 2
dataloader_pin_memory: true
system_prompt: |
  RESPONSE FORMAT (MANDATORY)
  You must reply in exactly this structure, with nothing before or after:
  <think>
  1. state the goal and constraints
  2. name the method(s)
  3. show each step to the result
  </think>
  <answer>
  THEANSWER
  </answer>

  RULES (NO EXCEPTIONS)
  - Output must start with <think> and end with </answer>.
  - Do not include any text outside the tags.
  - Put the final answer inside <answer> only.
  - Use exact math (fractions, radicals, pi, e).
  - Verify the result satisfies the original conditions.
# GRPO paired config (mirrors MaxEnt training settings)
# Training/eval & logging
bf16: false
fp16: true
use_vllm: true            # enable vLLM server path for generation
vllm_mode: server         # use external/inline server launched by the slurm helper
torch_compile: false      # disabled: torch.compile is unstable with DeepSpeed/ZeRO here
# Request vLLM logprob metadata (kept on for debugging even with model reference).
vllm_return_logprobs: true
vllm_request_logprobs: true
vllm_force_logprobs: true
# Force frozen reference-model scoring for KL/GRPO trust region.
maxent_reference_logprobs_source: auto
maxent_policy_entropy: false
maxent_logprob_chunk_size: 8
maxent_length_normalize_ref: false
vllm_sync_weights: true
vllm_sync_interval_steps: 1
vllm_gpu_memory_utilization: 0.9
do_eval: true
gradient_accumulation_steps: 8     # keep global batch size with higher per-device batch
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
train_grpo_objective: true
force_custom_loop: true
gen_temperature: 1.0
gen_top_p: 1.0
gen_top_k: 0
gen_best_of: 1
vllm_stop_sequences:
  - "</answer>"
  - "</answer>\n"
  - "</assistant>"
vllm_request_timeout: 10
vllm_max_retries: 2
hub_model_id: null
hub_strategy: "end"
learning_rate: 1.5e-6
optim: adamw_torch_fused
adam_beta2: 0.99
adam_epsilon: 1e-06
log_completions: true
log_level: 30
logging_first_step: true
logging_steps: 1
logging_strategy: steps
log_like_grpo: true
lr_scheduler_type: cosine
max_prompt_length: 2500      # trim prompt window to ease ref scoring memory
max_completion_length: 1200  # requested output length
max_steps: 1000
# GRPO requires >=2 generations to compute advantages; keep this at 2+ even when reducing memory.
num_generations: 8           # match MaxEnt group size for fair comparison
num_train_epochs: 18
output_dir: var/data/Qwen2.5-0.5B-Open-R1-GRPO-BASELINE-math-v1
overwrite_output_dir: true
per_device_eval_batch_size: 4
per_device_train_batch_size: 4
push_to_hub: false
report_to:
- wandb
wandb_project: open-r1-maxent-grpo
wandb_entity: ogd3-princeton-university
reward_funcs:
- pure_accuracy_math
reward_weights:
- 1

# Reverse‑KL weight β used inside MaxEnt update
# Gentle KL controller: keep updates small even when KL is far from target.
beta: 0.3
kl_target:        0.07
kl_horizon:       300
kl_ctl_step_size: 1.0

# Misc GRPO‑style knobs (not all consumed by the minimal script, kept for consistency)
max_grad_norm: 0.5
ppo_clip_range: 0.05
clip_range: 0.1
save_strategy: steps
save_steps: 50
eval_strategy: steps
eval_steps: 50
eval_before_train: true
save_total_limit: 1000
seed: 42
vllm_url: "http://localhost:29526/generate"
warmup_ratio: 0.1
