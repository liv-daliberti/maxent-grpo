# Method family: SEED-GRPO
# Loss backend: Dr.GRPO (`grpo_loss_type: dr_grpo`)
# Canonical label: SEED-GRPO (Dr.GRPO loss)
command: train-maxent
maxent:
  recipe: configs/recipes/Qwen2.5-1.5B-Instruct/grpo/config_math_stable.yaml
  training:
    objective: grpo
    controller_meta_enabled: false
    num_generations: 8
    max_steps: -1
    num_train_epochs: 20
    learning_rate: 1e-6
    beta: 0.08
    scale_rewards: false
    grpo_loss_type: dr_grpo
    num_iterations: 1
    grpo_beta_controller_enabled: false
    maxent_beta_controller_enabled: false
    max_grad_norm: 1.0
    clip_range: 0.2
    ppo_clip_range: 0.2
    seed_grpo_enabled: true
    seed_grpo_alpha: 0.0417
    seed_grpo_alpha_normalize_by_max_entropy: true
    seed_grpo_length_normalize_logprobs: true
    warmup_ratio: 0.0
    eval_steps: 32
    save_strategy: "no"
    push_to_hub: false
    output_dir: var/data/Qwen2.5-1.5B-Open-R1-SEED-GRPO-math-stable-v1

hydra:
  run:
    dir: var/artifacts/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: var/artifacts/outputs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
