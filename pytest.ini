[pytest]
# Keep pytest from descending into repo-local caches/build dirs that may hold
# transient pip build envs (e.g., var/tmp/pip-build-env-*/overlay/...).
cache_dir = var/pytest_cache
testpaths = tests
norecursedirs =
    var
    tmp
    .git
    .venv
    .local
    .cache
    build
    dist
    site-packages
    pip-build-env-*
filterwarnings =
    ignore::DeprecationWarning
    ignore:Can't initialize NVML:UserWarning:torch.cuda
    ignore:A NumPy version >=1\\.21\\.6 and <1\\.28\\.0 is required for this version of SciPy.*:UserWarning
    ignore:'maxent_grpo\.generate' found in sys\.modules after import of package 'maxent_grpo' .*:RuntimeWarning:runpy
markers =
    unit: fast, isolated unit tests (default)
    integration: cross-module or external-interface tests
    slow: long-running tests
    cli: CLI entrypoints and console scripts
    config: configuration and recipe validation
    core: baseline data/model utility tests
    evaluation: evaluation and scoring helpers
    pipelines: training pipeline orchestration/parity checks
    training: training loop/objective/reward helpers
    generation: training generation + rollout helpers
    runtime: training runtime dependency and environment checks
    ops: training ops/tooling helpers
    setup: training setup/bootstrap helpers
    logging: training telemetry/logging helpers
    rewards: reward and weighting helpers
    vllm: vLLM interface helpers
