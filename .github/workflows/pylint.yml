name: Pylint

on:
  push:
    branches: [ main, master, develop, dev, '**' ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pylint:
    runs-on: ubuntu-latest
    env:
      PYTHONNOUSERSITE: "1"
      PYTHONPATH: ./src
      XDG_CACHE_HOME: ${{ github.workspace }}/var/cache/xdg
      PIP_CACHE_DIR: ${{ github.workspace }}/var/cache/pip
      PYLINTHOME: ${{ github.workspace }}/var/cache/pylint
      TMPDIR: ${{ github.workspace }}/var/tmp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pylint
        run: |
          mkdir -p "$XDG_CACHE_HOME" "$PIP_CACHE_DIR" "$PYLINTHOME" "$TMPDIR"
          python -m pip install --upgrade pip
          python -m pip install pylint

      - name: Run pylint
        run: |
          # Ignore import errors to avoid requiring heavy runtime deps on CI
          python -m pylint --disable=import-error --rcfile=.pylintrc src || (echo "pylint found issues" && exit 1)
