name: Ruff

on:
  push:
    branches: [ main, master, develop, dev, '**' ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    env:
      PYTHONNOUSERSITE: "1"
      PYTHONPATH: ./src
      XDG_CACHE_HOME: ${{ github.workspace }}/var/cache/xdg
      PIP_CACHE_DIR: ${{ github.workspace }}/var/cache/pip
      TMPDIR: ${{ github.workspace }}/var/tmp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install tooling
        run: |
          mkdir -p "$XDG_CACHE_HOME" "$PIP_CACHE_DIR" "$TMPDIR"
          python -m pip install --upgrade pip
          python -m pip install -r configs/requirements-dev.txt

      - name: Run ruff
        run: python -m ruff check .
