name: Sphinx Docs

on:
  push:
    branches: [ main, master, develop, dev, '**' ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    env:
      PYTHONNOUSERSITE: "1"
      PYTHONPATH: ./src
      XDG_CACHE_HOME: ${{ github.workspace }}/var/cache/xdg
      PIP_CACHE_DIR: ${{ github.workspace }}/var/cache/pip
      TMPDIR: ${{ github.workspace }}/var/tmp
      SPHINX_ONLINE: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install docs dependencies
        run: |
          mkdir -p "$XDG_CACHE_HOME" "$PIP_CACHE_DIR" "$TMPDIR"
          python -m pip install --upgrade pip
          python -m pip install -e .[docs]
          python -m pip install -r docs/requirements.txt

      - name: Build Sphinx HTML
        run: python -m sphinx -W --keep-going -b html docs _build/html

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: _build/html
