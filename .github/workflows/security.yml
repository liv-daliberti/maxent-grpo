name: Security

on:
  push:
    branches: [ main, master, develop, dev, '**' ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      PYTHONNOUSERSITE: "1"
      PYTHONPATH: ./src
      XDG_CACHE_HOME: ${{ github.workspace }}/var/cache/xdg
      PIP_CACHE_DIR: ${{ github.workspace }}/var/cache/pip
      TMPDIR: ${{ github.workspace }}/var/tmp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install tooling
        run: |
          mkdir -p "$XDG_CACHE_HOME" "$PIP_CACHE_DIR" "$TMPDIR"
          python -m pip install --upgrade pip
          python -m pip install -r configs/requirements-dev.txt
          python -m pip install -e . --no-deps
          python -m pip install -c configs/constraints.txt "torch==2.8.0"

      - name: pip-audit (installed environment)
        run: |
          python -m pip_audit -l --progress-spinner off --skip-editable

      - name: Bandit (focused paths, medium+)
        run: |
          python -m bandit -q -ll -r src/maxent_grpo
