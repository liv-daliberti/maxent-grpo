name: Smoke

on:
  push:
    branches: [ main, master, develop, dev, '**' ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      PYTHONNOUSERSITE: "1"
      PYTHONPATH: ./src
      XDG_CACHE_HOME: ${{ github.workspace }}/var/cache/xdg
      PIP_CACHE_DIR: ${{ github.workspace }}/var/cache/pip
      HF_HOME: ${{ github.workspace }}/var/cache/huggingface
      HUGGINGFACE_HUB_CACHE: ${{ github.workspace }}/var/cache/huggingface/hub
      HF_HUB_CACHE: ${{ github.workspace }}/var/cache/huggingface/hub
      HF_DATASETS_CACHE: ${{ github.workspace }}/var/cache/huggingface/datasets
      TRANSFORMERS_CACHE: ${{ github.workspace }}/var/cache/huggingface/transformers
      TMPDIR: ${{ github.workspace }}/var/tmp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install project (no deps)
        run: |
          mkdir -p "$XDG_CACHE_HOME" "$PIP_CACHE_DIR" "$HF_HOME" "$HUGGINGFACE_HUB_CACHE" "$HF_DATASETS_CACHE" "$TRANSFORMERS_CACHE" "$TMPDIR"
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps

      - name: Install smoke dependencies
        run: |
          python -m pip install "numpy>=1.26.4" "pydantic>=2" "torch==2.8.0"

      - name: Run CLI smoke
        run: python tools/smoke_cli.py

      - name: Clean stale runtime logs
        run: |
          rm -rf var/artifacts/logs

      - name: Validate training logs (if present)
        run: python tools/validate_training_logs.py --allow-missing

      - name: Capture smoke artifacts
        run: |
          mkdir -p artifacts
          python - <<'PY'
          from pathlib import Path
          parts = []
          for rel in ["configs/requirements-dev.txt", "configs/pyrightconfig.json", "tools/perf_baseline.json"]:
              p = Path(rel)
              if p.exists():
                  parts.append(f"== {rel} ==\n{p.read_text()}\n")
          out = Path("artifacts") / "config_snapshot.txt"
          out.write_text("\n".join(parts))
          PY

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts
          path: artifacts
          if-no-files-found: ignore
